<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Panel Argenville – Productos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: radial-gradient(circle at top left, #0ea5e9 0, #020617 55%);
      color: #e5f3ff;
      margin: 0;
      padding: 24px;
    }
    .panel {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 24px;
      padding: 24px 24px 30px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8);
    }
    h1 {
      margin-top: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1.8fr;
      gap: 20px;
      margin-top: 16px;
    }
    label {
      font-size: 0.85rem;
      color: #9ca3af;
      display: block;
      margin-bottom: 4px;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.96);
      color: #e5f3ff;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    textarea {
      resize: vertical;
      min-height: 70px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 9px 18px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: radial-gradient(circle at top left, #22d3ee 0, #0f74d6 40%, #1d4ed8 100%);
      color: #e0f2fe;
      box-shadow: 0 12px 30px rgba(14, 165, 233, 0.85);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border-bottom: 1px solid rgba(51, 65, 85, 0.8);
      padding: 6px 8px;
    }
    th {
      text-align: left;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Panel Argenville – Productos</h1>
    <p style="color:#9ca3af;font-size:0.9rem;">
      Este panel es el borrador del backoffice. Hoy solo arma los datos en
      pantalla; el siguiente paso será conectar esto a una base de datos
      para guardar cambios sin tocar archivos a mano.
    </p>

    <div class="grid">
      <!-- Formulario -->
      <section>
        <h2 style="font-size:1rem;margin-top:0;">Nuevo producto</h2>
        <form id="form-producto">
          <label>Nombre del producto</label>
          <input type="text" id="p-nombre" required />

          <label>Categoría</label>
          <select id="p-categoria">
            <option value="alfajores">Alfajores &amp; dulces</option>
            <option value="yerba">Yerba &amp; mates</option>
            <option value="vinos">Vinos &amp; bebidas</option>
            <option value="snacks">Snacks &amp; salados</option>
            <option value="regalos">Regalos &amp; combos</option>
          </select>

          <label>Precio (USD)</label>
          <input type="number" step="0.01" id="p-precio" />

          <label>URL de imagen</label>
          <input type="text" id="p-imagen" placeholder="../img/archivo.png" />

          <label>Descripción</label>
          <textarea id="p-descripcion"></textarea>

          <button type="submit" class="btn-primary">
            Agregar (modo demo)
          </button>
        </form>
      </section>

      <!-- Tabla -->
      <section>
        <h2 style="font-size:1rem;margin-top:0;">Productos (demo)</h2>
        <table id="tabla-productos">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>USD</th>
            </tr>
          </thead>
          <tbody>
            <!-- Se llena por JS -->
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    const tablaBody = document.querySelector("#tabla-productos tbody");
    const form = document.getElementById("form-producto");
    let productosDemo = [];

    // Cargamos lo mismo que ve la tienda:
    fetch("../data/productos-argenville.json")
      .then((res) => res.json())
      .then((data) => {
        productosDemo = data;
        renderTabla();
      });

    function renderTabla() {
      tablaBody.innerHTML = productosDemo
        .map(
          (p, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td>${p.nombre}</td>
          <td>${p.categoria}</td>
          <td>${p.precioUsd || "-"}</td>
        </tr>
      `
        )
        .join("");
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const nuevo = {
        id: Date.now(),
        nombre: document.getElementById("p-nombre").value,
        categoria: document.getElementById("p-categoria").value,
        precioUsd: parseFloat(document.getElementById("p-precio").value || 0),
        imagen: document.getElementById("p-imagen").value || "",
        descripcion: document.getElementById("p-descripcion").value || ""
      };

      productosDemo.push(nuevo);
      renderTabla();

      console.log("📦 Producto para guardar en JSON/BD:", nuevo);
      alert(
        "Producto agregado en modo DEMO.\nCopiá el objeto desde la consola para pegarlo en productos-argenville.json hasta que tengamos base de datos."
      );

      form.reset();
    });
  </script>
</body>
</html>
